name: Fetch
module_path: omnigibson.robots.robot_configs.fetch
description: |
  Fetch Robot
  Reference: https://fetchrobotics.com/robotics-platforms/fetch-mobile-manipulator/
capabilities:
  - two_wheel_locomotion
  - articulated_trunk
  - active_camera
  - untucked_arm_pose

properties:
  # Shared kwargs in hierarchy
  relative_prim_path: null
  scale: null
  visible: true
  visual_only: false
  self_collisions: true
  link_physics_materials: null
  load_config: null
  fixed_base: false
  # Unique to USDObject hierarchy
  abilities: null
  # Unique to ControllableObject hierarchy
  control_freq: null
  controller_config: null
  action_type: "continuous"
  action_normalize: true
  reset_joint_pos: null
  # Unique to BaseRobot
  obs_modalities: ["rgb", "proprio"]
  include_sensor_names: null
  exclude_sensor_names: null
  proprio_obs: "default"
  sensor_config: null
  # Unique to ManipulationRobot
  grasping_mode: "physical"
  disable_grasp_handling: false
  finger_static_friction: null
  finger_dynamic_friction: null
  # Unique to MobileManipulationRobot
  default_reset_mode: "untuck"
  # Unique to UntuckedArmPoseRobot
  default_arm_pose: "vertical"

  tucked_default_joint_pos:
    [
        0.0,
        0.0,  # wheels
        0.02,  # trunk
        0.0,
        1.1707963267948966,
        0.0,  # head
        1.4707963267948965,
        -0.4,
        1.6707963267948966,
        0.0,
        1.5707963267948966,
        0.0,  # arm
        0.05,
        0.05,  # gripper
    ]
  
  # TODO: super(); those idx are also parent's property
  untucked_default_joint_pos:
    base_control_idx: 0.0
    trunk_control_idx: 0.385
    camera_control_idx: [0.0, 0.45]
    gripper_control_idx: [0.05, 0.05]

  default_arm_poses:
    vertical: [-0.94121, -0.64134, 1.55186, 1.65672, -0.93218, 1.53416, 2.14474]
    diagonal15: [-0.95587, -0.34778, 1.46388, 1.47821, -0.93813, 1.4587, 1.9939]
    diagonal30: [-1.06595, -0.22184, 1.53448, 1.46076, -0.84995, 1.36904, 1.90996]
    diagonal45: [-1.11479, -0.0685, 1.5696, 1.37304, -0.74273, 1.3983, 1.79618]
    horizontal: [-1.43016, 0.20965, 1.86816, 1.77576, -0.27289, 1.31715, 2.01226]
  _raw_controller_order:
    ["base", "trunk", "camera", f"arm_{self.default_arm}", f"gripper_{self.default_arm}"]
