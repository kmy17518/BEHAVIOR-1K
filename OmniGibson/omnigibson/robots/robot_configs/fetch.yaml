name: Fetch
module_path: omnigibson.robots.robot_configs.fetch
description: |
  Fetch Robot
  Reference: https://fetchrobotics.com/robotics-platforms/fetch-mobile-manipulator/
capabilities: [two_wheel, articulated_trunk, active_camera, untucked_arm_pose]
init:
  name: null
  relative_prim_path: null
  scale: null
  visible: true
  visual_only: false
  self_collisions: true
  link_physics_materials: null
  load_config: null
  fixed_base: false
  abilities: null
  control_freq: null
  controller_config: null
  action_type: "continuous"
  action_normalize: true
  reset_joint_pos: null
  obs_modalities: ["rgb", "proprio"]
  include_sensor_names: null
  exclude_sensor_names: null
  proprio_obs: "default"
  sensor_config: null
  grasping_mode: "physical"
  disable_grasp_handling: false
  finger_static_friction: null
  finger_dynamic_friction: null
  default_reset_mode: "untuck"
  default_arm_pose: "vertical"

property:
  _raw_controller_order: ["base", "trunk", "camera", "arm_0", "gripper_0"]
  _default_controllers:
    "base": "DifferentialDriveController"
    "trunk": "JointController"
    "camera": "JointController"
    "arm_0": "InverseKinematicsController"
    "gripper_0": "MultiFingerGripperController"
  wheel_radius: 0.0613
  wheel_axle_length: 0.372
  base_joint_names: ["l_wheel_joint", "r_wheel_joint"]
  camera_joint_names: ["head_pan_joint", "head_tilt_joint"]
  trunk_joint_names: ["torso_lift_joint"]
  arm_link_names:
    "0": ["shoulder_pan_link", "shoulder_lift_link", "upperarm_roll_link", "elbow_flex_link", "forearm_roll_link", "wrist_flex_link", "wrist_roll_link"]
  arm_joint_names:
    "0": ["shoulder_pan_joint", "shoulder_lift_joint", "upperarm_roll_joint", "elbow_flex_joint", "forearm_roll_joint", "wrist_flex_joint", "wrist_roll_joint"]
  eef_link_names:
    "0": "eef_link"
  finger_link_names:
    "0": ["r_gripper_finger_link", "l_gripper_finger_link"]
  finger_joint_names:
    "0": ["r_gripper_finger_joint", "l_gripper_finger_joint"]
  arm_workspace_range:
    "0": [-45, 45]
  teleop_rotation_offset:
    "0": [0, "pi/2", "pi"]
  tucked_default_joint_pos: [0.0, 0.0, 0.02, 0.0, 1.1707963267948966, 0.0, 1.4707963267948965, -0.4, 1.6707963267948966, 0.0, 1.5707963267948966, 0.0, 0.05, 0.05]
  default_arm_poses:
    vertical: [-0.94121, -0.64134, 1.55186, 1.65672, -0.93218, 1.53416, 2.14474]
    diagonal15: [-0.95587, -0.34778, 1.46388, 1.47821, -0.93813, 1.4587, 1.9939]
    diagonal30: [-1.06595, -0.22184, 1.53448, 1.46076, -0.84995, 1.36904, 1.90996]
    diagonal45: [-1.11479, -0.0685, 1.5696, 1.37304, -0.74273, 1.3983, 1.79618]
    horizontal: [-1.43016, 0.20965, 1.86816, 1.77576, -0.27289, 1.31715, 2.01226]
  untucked_default_joint_pos:
    base_control_idx: 0
    trunk_control_idx: 0.385
    camera_control_idx: [0.0, 0.45]
    gripper_control_idx: 
      "0": [0.05, 0.05]

